openapi: 3.0.4
info:
  title: Projectworks API
  contact:
    name: Support
    email: support@projectworks.com
  version: "1.0"
servers:
  - url: https://api.projectworksapp.com/
paths:
  /api/v1/AccountingSystem/contacts:
    get:
      tags:
        - AccountingSystem
      summary: Get accounting system contacts from the database
      description: Page size default = 100.
      operationId: AccountingSystem_GetContacts
      parameters:
        - name: ContactName
          in: query
          schema:
            type: string
        - name: ContactEmail
          in: query
          schema:
            type: string
        - name: CompanyName
          in: query
          schema:
            type: string
        - name: SuppliersOnly
          in: query
          schema:
            type: boolean
        - name: page
          in: query
          description: ""
          schema:
            pattern: ^-?(?:0|[1-9]\d*)$
            format: int32
            default: 1
        - name: pageSize
          in: query
          description: ""
          schema:
            pattern: ^-?(?:0|[1-9]\d*)$
            format: int32
            default: 100
      responses:
        "200":
          description: contacts found
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AccountingSystemContactResponse"
  /api/v1/AccountingSystem/trackingcategories:
    get:
      tags:
        - AccountingSystem
      summary: Get accounting system tracking categories from the database
      description: Page size default = 100.
      operationId: AccountingSystem_GetTrackingCategories
      parameters:
        - name: page
          in: query
          description: ""
          schema:
            pattern: ^-?(?:0|[1-9]\d*)$
            format: int32
            default: 1
        - name: pageSize
          in: query
          description: ""
          schema:
            pattern: ^-?(?:0|[1-9]\d*)$
            format: int32
            default: 100
      responses:
        "200":
          description: tracking categories found
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TrackingCategoriesResponse"
  /api/v1/Clients/Types:
    get:
      tags:
        - Clients
      summary: Get Client Types
      operationId: Clients_GetClientTypes
      responses:
        "200":
          description: Client Types found
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ClientType"
  /api/v1/Clients/FinancePaymentTermTypes:
    get:
      tags:
        - Clients
      summary: Get Client FinancePaymentTermTypes
      operationId: Clients_GetClientFinancePaymentTermType
      responses:
        "200":
          description: Client FinancePaymentTermTypes found
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ClientFinancePaymentTermType"
  /api/v1/Clients/BillingContacts:
    get:
      tags:
        - Clients
      summary: Get Billing Contacts
      description: Page size default = 100.
      operationId: Clients_GetBillingContacts
      parameters:
        - name: BillingContactID
          in: query
          schema:
            pattern: ^-?(?:0|[1-9]\d*)$
            format: int32
        - name: ClientID
          in: query
          schema:
            pattern: ^-?(?:0|[1-9]\d*)$
            format: int32
        - name: Email
          in: query
          schema:
            type: string
        - name: Name
          in: query
          schema:
            type: string
        - name: ExternalReference
          in: query
          schema:
            type: string
        - name: ModifiedSinceDate
          in: query
          schema:
            type: string
            format: date-time
        - name: page
          in: query
          description: ""
          schema:
            pattern: ^-?(?:0|[1-9]\d*)$
            format: int32
            default: 1
        - name: pageSize
          in: query
          description: ""
          schema:
            pattern: ^-?(?:0|[1-9]\d*)$
            format: int32
            default: 100
      responses:
        "200":
          description: Billing Contacts found
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BillingContactResponse"
  /api/v1/Clients/{clientID}/RateCards:
    get:
      tags:
        - Clients
      summary: Get Client RateCards
      operationId: Clients_GetClientRateCards
      parameters:
        - name: clientID
          in: path
          required: true
          schema:
            pattern: ^-?(?:0|[1-9]\d*)$
            format: int32
      responses:
        "200":
          description: Client RateCards found
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ClientRateCard"
  /api/v1/Clients:
    get:
      tags:
        - Clients
      summary: Get Clients
      description: Page size default = 100.
      operationId: Clients_GetClients
      parameters:
        - name: OfficeID
          in: query
          schema:
            pattern: ^-?(?:0|[1-9]\d*)$
            format: int32
        - name: ClientID
          in: query
          schema:
            pattern: ^-?(?:0|[1-9]\d*)$
            format: int32
        - name: IncludeCustomFields
          in: query
          schema:
            type: boolean
        - name: Name
          in: query
          schema:
            type: string
        - name: ExternalReference
          in: query
          schema:
            type: string
        - name: ModifiedSinceDate
          in: query
          schema:
            type: string
            format: date-time
        - name: page
          in: query
          description: ""
          schema:
            pattern: ^-?(?:0|[1-9]\d*)$
            format: int32
            default: 1
        - name: pageSize
          in: query
          description: ""
          schema:
            pattern: ^-?(?:0|[1-9]\d*)$
            format: int32
            default: 100
      responses:
        "200":
          description: Clients found
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ClientResponse"
    post:
      tags:
        - Clients
      summary: Create Client
      description: >-
        Returns the new Client and a response header with the location of the
        new Client.


        The finance information is not required, however you will not be able to
        generate invoices from this Client without it.
      operationId: Clients_CreateClient
      requestBody:
        description: ""
        content:
          application/json-patch+json:
            schema:
              $ref: "#/components/schemas/ClientRequest"
          application/json:
            schema:
              $ref: "#/components/schemas/ClientRequest"
          text/json:
            schema:
              $ref: "#/components/schemas/ClientRequest"
          application/*+json:
            schema:
              $ref: "#/components/schemas/ClientRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientResponse"
  /api/v1/Clients/{clientID}:
    get:
      tags:
        - Clients
      summary: Get Client
      operationId: Clients_GetClient
      parameters:
        - name: clientID
          in: path
          description: ""
          required: true
          schema:
            pattern: ^-?(?:0|[1-9]\d*)$
            type: integer
            format: int32
      responses:
        "200":
          description: Client found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientResponse"
    put:
      tags:
        - Clients
      summary: Replace Client
      description: Returns the Client
      operationId: Clients_Replace
      parameters:
        - name: clientID
          in: path
          description: ""
          required: true
          schema:
            pattern: ^-?(?:0|[1-9]\d*)$
            type: integer
            format: int32
      requestBody:
        description: ""
        content:
          application/json-patch+json:
            schema:
              $ref: "#/components/schemas/ClientRequest"
          application/json:
            schema:
              $ref: "#/components/schemas/ClientRequest"
          text/json:
            schema:
              $ref: "#/components/schemas/ClientRequest"
          application/*+json:
            schema:
              $ref: "#/components/schemas/ClientRequest"
        required: true
      responses:
        "200":
          description: Client replaced
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientResponse"
    patch:
      tags:
        - Clients
      summary: Update Client
      description: Returns the Client
      operationId: Clients_Update
      parameters:
        - name: clientID
          in: path
          description: ""
          required: true
          schema:
            pattern: ^-?(?:0|[1-9]\d*)$
            type: integer
            format: int32
      requestBody:
        description: ""
        content:
          application/json-patch+json:
            schema:
              $ref: "#/components/schemas/DeltaOfClientRequest"
          application/json:
            schema:
              $ref: "#/components/schemas/DeltaOfClientRequest"
          text/json:
            schema:
              $ref: "#/components/schemas/DeltaOfClientRequest"
          application/*+json:
            schema:
              $ref: "#/components/schemas/DeltaOfClientRequest"
        required: true
      responses:
        "200":
          description: Client updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClientResponse"
    delete:
      tags:
        - Clients
      summary: Delete Client
      operationId: Clients_Delete
      parameters:
        - name: clientID
          in: path
          description: ""
          required: true
          schema:
            pattern: ^-?(?:0|[1-9]\d*)$
            type: integer
            format: int32
      responses:
        "200":
          description: OK
  /api/v1/Clients/{clientID}/BillingContacts:
    get:
      tags:
        - Clients
      summary: Get Client Billing Contacts
      operationId: Clients_GetClientBillingContacts
      parameters:
        - name: clientID
          in: path
          description: ""
          required: true
          schema:
            pattern: ^-?(?:0|[1-9]\d*)$
            format: int32
        - name: BillingContactID
          in: query
          schema:
            pattern: ^-?(?:0|[1-9]\d*)$
            format: int32
        - name: ClientID
          in: query
          schema:
            pattern: ^-?(?:0|[1-9]\d*)$
            format: int32
        - name: Email
          in: query
          schema:
            type: string
        - name: Name
          in: query
          schema:
            type: string
        - name: ExternalReference
          in: query
          schema:
            type: string
        - name: ModifiedSinceDate
          in: query
          schema:
            type: string
            format: date-time
        - name: page
          in: query
          description: ""
          schema:
            pattern: ^-?(?:0|[1-9]\d*)$
            format: int32
      responses:
        "200":
          description: Billing Contacts found
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BillingContactResponse"
    post:
      tags:
        - Clients
      summary: Create/Update Billing Contact
      description: Returns the created/updated Billing Contact, and if created a
        response header with the location of the new Contact.
      operationId: Clients_CreateOrUpdateBillingContact
      parameters:
        - name: clientID
          in: path
          description: ""
          required: true
          schema:
            pattern: ^-?(?:0|[1-9]\d*)$
            format: int32
      requestBody:
        description: ""
        content:
          application/json-patch+json:
            schema:
              $ref: "#/components/schemas/BillingContactRequest"
          application/json:
            schema:
              $ref: "#/components/schemas/BillingContactRequest"
          text/json:
            schema:
              $ref: "#/components/schemas/BillingContactRequest"
          application/*+json:
            schema:
              $ref: "#/components/schemas/BillingContactRequest"
        required: true
      responses:
        "200":
          description: Billing Contact updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BillingContactResponse"
  /api/v1/Clients/BillingContacts/{billingContactID}:
    delete:
      tags:
        - Clients
      summary: Delete Billing Contact
      operationId: Clients_DeleteBillingContact
      parameters:
        - name: billingContactID
          in: path
          description: ""
          required: true
          schema:
            pattern: ^-?(?:0|[1-9]\d*)$
            format: int32
      responses:
        "200":
          description: OK
  /api/v1/Clients/{clientID}/Fields:
    put:
      tags:
        - Clients
      summary: Create or update Custom Fields data
      description: Returns the Custom Fields
      operationId: Clients_ReplaceCustomFields
      parameters:
        - name: clientID
          in: path
          description: ""
          required: true
          schema:
            pattern: ^-?(?:0|[1-9]\d*)$
            type: integer
            format: int32
      requestBody:
        description: ""
        content:
          application/json-patch+json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/CustomFieldEntityRequest"
          application/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/CustomFieldEntityRequest"
          text/json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/CustomFieldEntityRequest"
          application/*+json:
            schema:
              type: array
              items:
                $ref: "#/components/schemas/CustomFieldEntityRequest"
        required: true
      responses:
        "200":
          description: Custom fields data created/updated
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CustomFieldEntityResponse"
  /api/v1/Common/Countries:
    get:
      tags:
        - Common
      summary: Get Countries
      operationId: Common_GetCountries
      parameters:
        - name: CountryID
          in: query
          schema:
            pattern: ^-?(?:0|[1-9]\d*)$
            format: int32
        - name: Code
          in: query
          schema:
            type: string
        - name: Name
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Countries found
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Country"
  /api/v1/Common/Currencies:
    get:
      tags:
        - Common
      summary: Get Currencies
      operationId: Common_GetCurrencies
      parameters:
        - name: CurrencyID
          in: query
          schema:
            pattern: ^-?(?:0|[1-9]\d*)$
            format: int32
        - name: Code
          in: query
          schema:
            type: string
        - name: Name
          in: query
          schema:
            type: string
        - name: IsActive
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Currencies found
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Currency"
  /api/v1/Common/RevenueRateCards:
    get:
      tags:
        - Common
      summary: Get RevenueRateCards
      operationId: Common_GetRevenueRateCards
      parameters:
        - name: Name
          in: query
          schema:
            type: string
        - name: Description
          in: query
          schema:
            type: string
        - name: IsActive
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: RevenueRateCards found
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RevenueRateCard"
  /api/v1/Common/CostRateCards:
    get:
      tags:
        - Common
      summary: Get CostRateCards
      operationId: Common_GetCostRateCards
      parameters:
        - name: Name
          in: query
          schema:
            type: string
        - name: Description
          in: query
          schema:
            type: string
        - name: IsActive
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: CostRateCards found
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CostRateCard"
  /api/v1/Common/Locations:
    get:
      tags:
        - Common
      summary: Get Locations
      operationId: Common_GetLocations
      parameters:
        - name: LocationID
          in: query
          schema:
            pattern: ^-?(?:0|[1-9]\d*)$
            format: int32
        - name: Name
          in: query
          schema:
            type: string
        - name: IsActive
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Locations found
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Location"
  /api/v1/Common/HolidayCalendars:
    get:
      tags:
        - Common
      summary: Get HolidayCalendars
      operationId: Common_GetHolidayCalendars
      parameters:
        - name: Name
          in: query
          schema:
            type: string
      responses:
        "200":
          description: HolidayCalendars found
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HolidayCalendar"
  /api/v1/Common/GLCodes:
    get:
      tags:
        - Common
      summary: Get GLCodes
      operationId: Common_GetGLCodes
      parameters:
        - name: Code
          in: query
          schema:
            type: string
        - name: Description
          in: query
          schema:
            type: string
        - name: IsActive
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: GLCodes found
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GLCode"
  /api/v1/Common/AgreementTypes:
    get:
      tags:
        - Common
      summary: Get AgreementTypes
      operationId: Common_GetAgreementTypes
      parameters:
        - name: Name
          in: query
          schema:
            type: string
      responses:
        "200":
          description: AgreementTypes found
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AgreementType"
  /api/v1/Common/TaxTypes:
    get:
      tags:
        - Common
      summary: Get Tax Types
      operationId: Common_GetTaxTypes
      parameters:
        - name: Name
          in: query
          schema:
            type: string
        - name: IsActive
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Tax Types found
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TaxType"
  /api/v1/Common/BillingContacts:
    get:
      tags:
        - Common
      summary: Get Billing Contacts
      description: Page size default = 100.
      operationId: Common_GetBillingContacts
      parameters:
        - name: BillingContactID
          in: query
          schema:
            pattern: ^-?(?:0|[1-9]\d*)$
            format: int32
        - name: ClientID
          in: query
          schema:
            pattern: ^-?(?:0|[1-9]\d*)$
            format: int32
        - name: Email
          in: query
          schema:
            type: string
        - name: Name
          in: query
          schema:
            type: string
        - name: ExternalReference
          in: query
          schema:
            type: string
        - name: ModifiedSinceDate
          in: query
          schema:
            type: string
            format: date-time
        - name: page
          in: query
          description: ""
          schema:
            pattern: ^-?(?:0|[1-9]\d*)$
            format: int32
            default: 1
        - name: pageSize
          in: query
          description: ""
          schema:
            pattern: ^-?(?:0|[1-9]\d*)$
            format: int32
            default: 100
      responses:
        "200":
          description: Billing Contacts found
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BillingContactRequest"
  /api/v1/CustomFields/Types:
    get:
      tags:
        - CustomFields
      summary: Get Custom Field Types
      operationId: CustomFields_GetCustomFieldTypes
      responses:
        "200":
          description: Custom Field Types found
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CustomFieldType"
  /api/v1/CustomFields/EntityTypes:
    get:
      tags:
        - CustomFields
      summary: Get Custom Field Entity Types
      operationId: CustomFields_GetCustomFieldEntityTypes
      responses:
        "200":
          description: Custom Field Entity Types found
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CustomFieldEntityType"
  /api/v1/CustomFields/EntitySubTypes:
    get:
      tags:
        - CustomFields
      summary: Get Custom Field Entity Sub Types
      operationId: CustomFields_GetCustomFieldEntitySubTypes
      responses:
        "200":
          description: Custom Field Entity Sub Types found
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CustomFieldEntitySubType"
  /api/v1/CustomFields:
    get:
      tags:
        - CustomFields
      summary: Get Custom Fields
      description: Page size default = 100.
      operationId: CustomFields_GetCustomFields
      parameters:
        - name: FieldID
          in: query
          schema:
            pattern: ^-?(?:0|[1-9]\d*)$
            format: int32
        - name: FieldTypeID
          in: query
          schema:
            pattern: ^-?(?:0|[1-9]\d*)$
            format: int32
        - name: EntityTypeID
          in: query
          schema:
            pattern: ^-?(?:0|[1-9]\d*)$
            format: int32
        - name: EntitySubTypeID
          in: query
          schema:
            pattern: ^-?(?:0|[1-9]\d*)$
            format: int32
        - name: Label
          in: query
          schema:
            type: string
        - name: page
          in: query
          description: ""
          schema:
            pattern: ^-?(?:0|[1-9]\d*)$
            format: int32
            default: 1
        - name: pageSize
          in: query
          description: ""
          schema:
            pattern: ^-?(?:0|[1-9]\d*)$
            format: int32
            default: 100
      responses:
        "200":
          description: Custom Fields found
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CustomFieldResponse"
  /api/v1/CustomFields/Set:
    post:
      tags:
        - CustomFields
      summary: Set custom field data
      description: |-
        Set custom field data for an entity

        Returns the custom field and data
      operationId: CustomFields_SetCustomField
      requestBody:
        content:
          application/json-patch+json:
            schema:
              $ref: "#/components/schemas/CustomFieldDataRequest"
          application/json:
            schema:
              $ref: "#/components/schemas/CustomFieldDataRequest"
          text/json:
            schema:
              $ref: "#/components/schemas/CustomFieldDataRequest"
          application/*+json:
            schema:
              $ref: "#/components/schemas/CustomFieldDataRequest"
        required: true
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CustomFieldEntityResponse"
  /api/v1/ExpenseClaims/Types:
    get:
      tags:
        - ExpenseClaims
      summary: Get expense claim types
      operationId: ExpenseClaims_GetTypes
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ExpenseClaimType"
  /api/v1/ExpenseClaims:
    get:
      tags:
        - ExpenseClaims
      summary: Get expense claims
      description: |-
        Page size default = 100.

        Results are ordered by ExpenseClaimID (ascending).
      operationId: ExpenseClaims_GetList
      parameters:
        - name: AfterExpenseClaimID
          in: query
          schema:
            pattern: ^-?(?:0|[1-9]\d*)$
            format: int32
        - name: ModifiedSinceDate
          in: query
          schema:
            type: string
            format: date-time
        - name: UserID
          in: query
          schema:
            pattern: ^-?(?:0|[1-9]\d*)$
            format: int32
        - name: ClientID
          in: query
          schema:
            pattern: ^-?(?:0|[1-9]\d*)$
            format: int32
        - name: ProjectID
          in: query
          schema:
            pattern: ^-?(?:0|[1-9]\d*)$
            format: int32
        - name: ModuleID
          in: query
          schema:
            pattern: ^-?(?:0|[1-9]\d*)$
            format: int32
