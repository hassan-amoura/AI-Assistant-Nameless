  /api/v1/Resources/Set:
    post:
      tags:
        - Resources
      summary: Set Resource
      description: >-
        `Date` determines which week to set the resource for. `Date` must be a
        Monday, and must not be before the current week.


        `ResourceTypeID` must be set to 1 (User).


        If `Hours` &gt; 0, a resource entry is created (if it doesn't yet exist)
        or updated (if it already exists). 

        If `Hours` == 0, the corresponding resource entry is deleted (if it
        exists), or this operation is a no-op (if the entry does not exist).

        `Hours` is rounded to 2 decimal places.
      operationId: Resources_SetResource
      requestBody:
        content:
          application/json-patch+json:
            schema:
              $ref: "#/components/schemas/ResourceRequest"
          application/json:
            schema:
              $ref: "#/components/schemas/ResourceRequest"
          text/json:
            schema:
              $ref: "#/components/schemas/ResourceRequest"
          application/*+json:
            schema:
              $ref: "#/components/schemas/ResourceRequest"
        required: true
      responses:
        "200":
          description: Resource was successfully created/updated/deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResourceResponse"
