      description: >-
        Create or update a ProjectWorks Task to that maps to a Service Desk
        Incident.


        Mandatory 'IsKey' Custom Fields:

        A Module Custom Field that identifies the Module to update (maps to the
        Service Desk Service Name).

        A Task Custom Field that identifies the Task to update (maps to the
        Service Desk Incident ID).

        A User Custom Field that identifies the User to update (maps to the
        Service Desk User ID).


        Optional Custom Fields:

        Any number of other Module, Task or User Custom Fields can be added to
        the Fields list.
      operationId: ServiceDesk_CreateOrUpdateTask
      requestBody:
        description: ServiceDeskTaskRequest
        content:
          application/json-patch+json:
