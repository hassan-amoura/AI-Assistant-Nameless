      summary: Create expense claim
      description: >-
        An expense claim must be associated with a project and module.


        If IsReimbursable is false, then ExpenseClaimStatusID is not required.


        The required fields `FileName` and `FileContent` are used to associate a
        file with the expense claim. 

        Valid file types are .jpg, .png and .pdf. 

        `FileContent` must be set to a base64 encoded string representation of
        the file content.

        The maximum allowed file size is 20 Mb.


        Returns the created expense claim
      operationId: ExpenseClaims_Create
      requestBody:
        content:
          application/json-patch+json:
            schema:
              $ref: "#/components/schemas/ExpenseClaimRequest"
