services:
  postgres:
    image: postgres:16-alpine
    container_name: pw-report-builder-pg
    restart: unless-stopped
    environment:
      POSTGRES_DB: pw_report_builder
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pw_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d pw_report_builder"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pw_pgdata:
